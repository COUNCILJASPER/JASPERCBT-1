<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASPERS CBT - Exam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>JASPERS CBT</h1>
        <div id="examInfo">
            <p><strong>Student:</strong> <span id="displayName"></span></p>
            <p><strong>Question <span id="currentQ"></span> of <span id="totalQ"></span></strong></p>
        </div>
        <hr>
        <div id="questionContainer">
            <h3 id="questionText">Loading question...</h3>
            <div id="optionsContainer"></div>
        </div>
        <br>
        <button id="nextBtn" onclick="nextQuestion()">Next →</button>
        <button id="submitBtn" onclick="submitExam()" style="display:none;">Submit Exam</button>
    </div>
    <script src="questions.js"></script>
    <script src="exam.js"></script>
</body>
</html>
