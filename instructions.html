<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASPERS CBT - Instructions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>JASPERS CBT</h1>
        <h2>Exam Instructions</h2>
        <div class="instructions">
            <ol>
                <li>Read each question carefully.</li>
                <li>Select the best answer from the options.</li>
                <li>You cannot go back to previous questions.</li>
                <li>Submit your answers when finished.</li>
                <li>Good luck!</li>
            </ol>
        </div>
        <button onclick="beginExam()">Start Exam</button>
    </div>
    <script>
        function beginExam() {
            const name = localStorage.getItem("candidateName");
            if (!name) {
                alert("Please login first!");
                window.location.href = "index.html";
                return;
            }
            window.location.href = "exam.html";
        }
    </script>
</body>
</html>
