<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JASPERS CBT - Instructions</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="login-box">

<h1>JASPERS CBT</h1>

<h2>Instructions</h2>

<p style="text-align:left; line-height:1.8; margin-top:20px;">

Candidate:
<strong id="candidateName"></strong>

<br><br>

* Total Questions: <strong>10</strong>

<br>

* Time Allowed: <strong>50 Minutes</strong>

<br>

* Choose only ONE answer.

<br>

* Click NEXT to move to another question.

<br>

* Your score will appear immediately after submission.

</p>

<br>

<button onclick="startCBT()">

START CBT

</button>

</div>

</div>

<script>

document.getElementById("candidateName").innerHTML =
localStorage.getItem("candidateName");

function startCBT(){

window.location.href="exam.html";

}

</script>

</body>

</html>
